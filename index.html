<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 ROLETA MISTERIOSA 📦</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0f; color: #ffffff;
            min-height: 100dvh; 
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; padding: 10px;
        }

        .card-panel {
            background-color: #12121a; padding: 25px 20px; border-radius: 16px;
            border: 1px solid #00e5ff; box-shadow: 0 0 25px rgba(0, 229, 255, 0.15);
            text-align: center; width: 100%; max-width: 450px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 95dvh; 
        }

        h1 { color: #00e5ff; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); font-size: 24px; margin-top: 0; margin-bottom: 25px; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #333; background-color: #1a1a26; color: #fff; text-align: center;
            outline: none; transition: 0.3s; font-size: 16px; font-weight: bold;
        }
        input:focus { border-color: #00e5ff; box-shadow: 0 0 8px rgba(0, 229, 255, 0.3); }

        .btn-action {
            width: 100%; padding: 15px; background-color: #00e5ff; color: #000;
            font-weight: bold; font-size: 16px; border: none; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-action:hover:not(:disabled) { box-shadow: 0 0 15px rgba(0, 229, 255, 0.6); transform: translateY(-2px); }
        .btn-action:disabled { background-color: #1a3333; color: #555; cursor: not-allowed; }

        .hidden { display: none !important; }
        .error-message { color: #ff4d4d; margin-top: 10px; font-size: 14px; font-weight: bold; padding: 5px; }

        .roleta-container { position: relative; width: 300px; height: 300px; margin: 0 auto 25px auto; }
        #canvas-roleta {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 5s cubic-bezier(0.2, 0.1, 0.1, 1);
            border: 4px solid #1a1a26; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .pino {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent;
            border-top: 35px solid #ff0055; z-index: 10;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.7));
        }

        .tabela-container { width: 100%; margin-top: 25px; }
        table {
            width: 100%; border-collapse: collapse; background-color: #0d0d14;
            border-radius: 8px; overflow: hidden; border: 1px solid #333;
        }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #222; font-size: 14px; }
        th { background-color: #1a1a26; color: #00e5ff; font-weight: bold; text-transform: uppercase; text-align: center; }
        td:nth-child(2) { color: #00ffb3; font-weight: bold; text-align: right; width: 70px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: #12121a; border: 2px solid #00e5ff; border-radius: 12px;
            padding: 40px 30px; text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-titulo { color: #fff; font-size: 20px; margin-bottom: 10px; text-transform: uppercase; }
        .modal-premio { font-size: 26px; font-weight: bold; margin-bottom: 20px; }
        
        .instrucao-ticket {
            background-color: rgba(0, 229, 255, 0.1); border: 1px dashed #00e5ff;
            padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 14px; color: #b3b3cc; line-height: 1.5;
        }
        .modal-btn {
            background-color: #242430; color: #00e5ff; border: 1px solid #00e5ff;
            padding: 14px 30px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container">
        
        <div id="tela-login" class="card-panel">
            <h1>📦 ROLETA MISTERIOSA 📦</h1>
            <input type="text" id="chave-input" placeholder="Insira sua key" autocomplete="off">
            <button id="btn-entrar" class="btn-action" onclick="verificarChave()">Acessar Painel</button>
            <div id="erro-login" class="error-message hidden">Key inválida ou já utilizada!</div>
        </div>

        <div id="tela-roleta" class="card-panel hidden">
            <h1>📦 GIRE PARA GANHAR 📦</h1>
            
            <div class="roleta-container">
                <div class="pino"></div>
                <canvas id="canvas-roleta" width="400" height="400"></canvas>
            </div>

            <button id="btn-girar" class="btn-action" onclick="girarRoleta()">🎲 GIRAR ROLETA 🎲</button>

            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>Produtos na Caixa</th>
                            <th>Chance</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="modal-notificacao" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-titulo">Você tirou:</div>
            <div id="texto-notificacao" class="modal-premio">???</div>
            <div id="aviso-ticket" class="instrucao-ticket hidden">
                Tire um <strong>Print desta tela</strong> e abra um ticket em nosso servidor da Shadow para receber seu produto ou dinheiro!
            </div>
            <button class="modal-btn" onclick="fecharModal()">OK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://gerador-key-e364f-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const produtos = [
            { nome: "Nada", peso: 45, cor: "#ff3333" },
            { nome: "Proxy iOS", peso: 5, cor: "#33ccff" },
            { nome: "Mod Apk 1 dia", peso: 10, cor: "#9933ff" },
            { nome: "Passador replay", peso: 8, cor: "#ff9933" },
            { nome: "Produto de R$1", peso: 12, cor: "#00cc66" },
            { nome: "Ganhou R$ 1,00", peso: 4, cor: "#ffcc00" },
            { nome: "Ganhou R$ 0,50", peso: 6, cor: "#ff66cc" },
            { nome: "Ganhou R$ 0,25", peso: 10, cor: "#3366ff" }
        ];

        const corpoTabela = document.getElementById("corpo-tabela");
        produtos.forEach(prod => {
            corpoTabela.innerHTML += `<tr><td>${prod.nome}</td><td>${prod.peso}%</td></tr>`;
        });

        let audioCtx = null;

        function verificarChave() {
            const input = document.getElementById("chave-input").value.trim().toUpperCase();
            if(!input) return;
            
            const btn = document.getElementById("btn-entrar");
            const erroDiv = document.getElementById("erro-login");
            btn.disabled = true;
            erroDiv.classList.add("hidden");

            if (input === "TESTE123") {
                liberarPainel();
                return;
            }

            const ref = database.ref("chaves/" + input);
            ref.once("value").then((snap) => {
                if (snap.exists() && snap.val() === true) {
                    ref.remove().then(() => {
                        liberarPainel();
                    });
                } else {
                    erroDiv.innerText = "Key inválida ou já utilizada!";
                    erroDiv.classList.remove("hidden");
                    btn.disabled = false;
                }
            }).catch((error) => {
                console.error(error);
                erroDiv.innerText = "Erro de conexão com o banco.";
                erroDiv.classList.remove("hidden");
                btn.disabled = false;
            });
        }

        function liberarPainel() {
            document.getElementById("tela-login").classList.add("hidden");
            document.getElementById("tela-roleta").classList.remove("hidden");
            desenharRoleta();
        }

        function tocarSomTick() {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } catch(e) { console.log("Áudio bloqueado"); }
        }

        const canvas = document.getElementById("canvas-roleta");
        const ctx = canvas.getContext("2d");
        const arco = 2 * Math.PI / produtos.length;
        let anguloAtual = 0;

        function desenharRoleta() {
            const raio = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = 0; i < produtos.length; i++) {
                const angulo = i * arco;
                ctx.beginPath();
                ctx.fillStyle = produtos[i].cor;
                ctx.moveTo(raio, raio);
                ctx.arc(raio, raio, raio, angulo, angulo + arco);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#1a1a26";
                ctx.stroke();

                ctx.save();
                ctx.translate(raio, raio);
                ctx.rotate(angulo + arco / 2);
                ctx.textAlign = "right"; 
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 13px sans-serif"; 
                ctx.shadowColor = "rgba(0,0,0,0.9)";
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;

                ctx.fillText(produtos[i].nome, raio - 15, 0, 100); 
                ctx.restore();
            }
        }

        function sortearIndiceReal() {
            let total = produtos.reduce((acc, p) => acc + p.peso, 0);
            let random = Math.random() * total;
            let soma = 0;
            for (let i = 0; i < produtos.length; i++) {
                soma += produtos[i].peso;
                if (random <= soma) return i;
            }
            return 0;
        }

        function girarRoleta() {
            document.getElementById("btn-girar").disabled = true;
            tocarSomTick();

            const indiceSorteado = sortearIndiceReal();
            const premioFinal = produtos[indiceSorteado];

            const girosExtras = 6 * 360; 
            const grausPorFatia = 360 / produtos.length;
            const anguloFatia = (indiceSorteado * grausPorFatia) + (grausPorFatia / 2);
            const anguloParada = girosExtras + (270 - anguloFatia); 

            let tempo = 0;
            let intervaloSom = setInterval(() => {
                tocarSomTick();
                tempo += 160;
                if(tempo > 4600) clearInterval(intervaloSom);
            }, 160);

            anguloAtual += anguloParada;
            canvas.style.transform = `rotate(${anguloAtual}deg)`;

            setTimeout(() => {
                clearInterval(intervaloSom);
                mostrarModalPremio(premioFinal);
            }, 5000);
        }

        function mostrarModalPremio(premio) {
            const modal = document.getElementById("modal-notificacao");
            const texto = document.getElementById("texto-notificacao");
            const avisoTicket = document.getElementById("aviso-ticket");
            
            texto.innerText = premio.nome;
            
            if (premio.nome === "Nada") {
                texto.style.color = "#ff3333";
                texto.style.textShadow = "0 0 15px rgba(255, 51, 51, 0.6)";
                avisoTicket.classList.add("hidden"); 
            } else {
                texto.style.color = "#00ffb3";
                texto.style.textShadow = "0 0 15px rgba(0, 255, 179, 0.6)";
                avisoTicket.classList.remove("hidden"); 
            }
            modal.classList.remove("hidden");
        }

        function fecharModal() {
            document.getElementById("modal-notificacao").classList.add("hidden");
            document.getElementById("btn-girar").disabled = false;
        }
    </script>
</body>
</html>
