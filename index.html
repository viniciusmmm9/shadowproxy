<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 ROLETA MISTERIOSA 📦</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .fullscreen-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-panel {
            background-color: #12121a;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #00ffb3;
            box-shadow: 0 0 25px rgba(0, 255, 179, 0.2);
            text-align: center;
            width: 100%;
            max-width: 420px;
            transition: all 0.3s ease;
        }

        h1 {
            color: #00ffb3;
            text-shadow: 0 0 12px rgba(0, 255, 179, 0.4);
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        p {
            color: #b3b3cc;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #232335;
            border-radius: 8px;
            background-color: #1a1a26;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #00ffb3;
            box-shadow: 0 0 10px rgba(0, 255, 179, 0.3);
        }

        .btn-action {
            width: 100%;
            padding: 14px;
            background-color: #00ffb3;
            color: #0a0a0f;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-action:hover:not(:disabled) {
            box-shadow: 0 0 20px rgba(0, 255, 179, 0.6);
            transform: translateY(-2px);
        }

        .btn-action:disabled {
            background-color: #1a332a;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .hidden {
            display: none !important;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            font-weight: 500;
        }

        /* Estilo do Visor da Roleta */
        .roulette-box {
            background-color: #1a1a26;
            border: 2px dashed #00e5ff;
            border-radius: 12px;
            padding: 30px 15px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #display-premio {
            font-size: 24px;
            font-weight: bold;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            transition: 0.1s;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="fullscreen-container">
        
        <div id="tela-login" class="card-panel">
            <h1>📦 ROLETA MISTERIOSA 📦</h1>
            <p>Insira sua chave de acesso exclusiva para entrar</p>
            <input type="text" id="chave-input" class="input-field" placeholder="CHAVE-XXXX-XXXX" autocomplete="off">
            <button id="btn-entrar" class="btn-action" onclick="verificarEUsarChave()">Entrar no Painel</button>
            <div id="erro-login" class="error-message hidden">Chave inválida ou já utilizada!</div>
        </div>

        <div id="tela-email" class="card-panel hidden">
            <h1>📦 ROLETA MISTERIOSA 📦</h1>
            <p>Informe seu Gmail para salvar os seus dados e liberar a roleta:</p>
            <input type="email" id="email-input" class="input-field" placeholder="seuemail@gmail.com" autocomplete="off">
            <button class="btn-action" onclick="prosseguirParaRoleta()">Continuar</button>
            <div id="erro-email" class="error-message hidden">Por favor, insira um Gmail válido.</div>
        </div>

        <div id="tela-roleta" class="card-panel hidden">
            <h1>📦 ROLETA MISTERIOSA 📦</h1>
            <div class="roulette-box">
                <div id="display-premio">Sorteie seu Prêmio!</div>
            </div>
            <button id="btn-girar" class="btn-action" onclick="iniciarGiro()">Girar Roleta</button>
        </div>

    </div>

    <script>
        // Configuração do seu Firebase Realtime Database
        const firebaseConfig = {
            databaseURL: "https://gerador-key-e364f-default-rtdb.firebaseio.com/"
        };
        
        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let emailRegistrado = "";

        // Função de validação e exclusão da chave (Uso Único)
        function verificarEUsarChave() {
            const inputChave = document.getElementById("chave-input").value.trim().toUpperCase();
            const erroDiv = document.getElementById("erro-login");
            const btnEntrar = document.getElementById("btn-entrar");

            if (!inputChave) return;

            btnEntrar.disabled = true;
            erroDiv.classList.add("hidden");

            // Verifica se a chave existe no nó /chaves
            const refChave = database.ref("chaves/" + inputChave);
            
            refChave.once("value").then((snapshot) => {
                if (snapshot.exists() && snapshot.val() === true) {
                    // Chave é válida! Deleta imediatamente para ninguém mais usar
                    refChave.remove().then(() => {
                        // Avança de tela
                        document.getElementById("tela-login").classList.add("hidden");
                        document.getElementById("tela-email").classList.remove("hidden");
                    });
                } else {
                    // Chave não existe ou já foi apagada
                    erroDiv.classList.remove("hidden");
                    btnEntrar.disabled = false;
                }
            }).catch((error) => {
                console.error(error);
                erroDiv.innerText = "Erro ao conectar ao Firebase.";
                erroDiv.classList.remove("hidden");
                btnEntrar.disabled = false;
            });
        }

        // Validação e envio do e-mail
        function prosseguirParaRoleta() {
            const inputEmail = document.getElementById("email-input").value.trim().toLowerCase();
            const erroDiv = document.getElementById("erro-email");

            if (!inputEmail || !inputEmail.includes("@") || !inputEmail.includes("gmail.com")) {
                erroDiv.classList.remove("hidden");
                return;
            }

            erroDiv.classList.add("hidden");
            emailRegistrado = inputEmail;

            // Salva o e-mail no Firebase para seu controle
            database.ref("participantes").push({
                email: emailRegistrado,
                data: new Date().toLocaleString("pt-BR")
            });

            // Avança para a roleta
            document.getElementById("tela-email").classList.add("hidden");
            document.getElementById("tela-roleta").classList.remove("hidden");
        }

        // Configuração exata das probabilidades solicitadas
        const listaPremios = [
            { nome: "Nada", peso: 78 },
            { nome: "Proxy iOS", peso: 1 },
            { nome: "Mod Apk 1 dia", peso: 2 },
            { nome: "Passador de replay", peso: 3 },
            { nome: "Qualquer produto da loja de 1 real", peso: 5 },
            { nome: "Ganhou 1 Real", peso: 2 },
            { nome: "Ganhou 50 Centavos", peso: 3 },
            { nome: "Ganhou 25 Centavos", peso: 5 }
        ];

        // Animação visual e sorteio
        function iniciarGiro() {
            const btnGirar = document.getElementById("btn-girar");
            const display = document.getElementById("display-premio");
            
            btnGirar.disabled = true;
            display.style.color = "#00e5ff";

            let contadorEfeito = 0;
            
            // Efeito visual mudando os nomes rapidamente
            const intervaloEfeito = setInterval(() => {
                const itemAleatorio = listaPremios[Math.floor(Math.random() * listaPremios.length)];
                display.innerText = itemAleatorio.nome;
                contadorEfeito += 100;

                if (contadorEfeito >= 3000) { // O efeito dura 3 segundos
                    clearInterval(intervaloEfeito);
                    calcularResultadoFinal(display);
                }
            }, 100);
        }

        // Aplicação do cálculo de porcentagem real baseado nos pesos
        function calcularResultadoFinal(elementoDisplay) {
            const totalPesos = listaPremios.reduce((acumulador, item) => acumulador + item.peso, 0);
            let numeroSorteado = Math.random() * totalPesos;
            let somaAtual = 0;
            let premioVencedor = "Nada";

            for (let i = 0; i < listaPremios.length; i++) {
                somaAtual += listaPremios[i].peso;
                if (numeroSorteado <= somaAtual) {
                    premioVencedor = listaPremios[i].nome;
                    break;
                }
            }

            // Mostra o resultado final na tela
            elementoDisplay.innerText = premioVencedor;
            
            // Customiza a cor baseado no resultado
            if (premioVencedor === "Nada") {
                elementoDisplay.style.color = "#ff4d4d";
                elementoDisplay.style.textShadow = "0 0 12px rgba(255, 77, 77, 0.5)";
            } else {
                elementoDisplay.style.color = "#00ffb3";
                elementoDisplay.style.textShadow = "0 0 12px rgba(0, 255, 179, 0.5)";
                
                // Opcional: Salvar o prêmio que o e-mail ganhou no banco
                database.ref("ganhadores").push({
                    email: emailRegistrado,
                    premio: premioVencedor,
                    data: new Date().toLocaleString("pt-BR")
                });
            }
        }
    </script>
</body>
</html>
