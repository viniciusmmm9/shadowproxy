<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 ROLETA MISTERIOSA 📦</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0f; color: #ffffff;
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            width: 100%; padding: 20px;
        }

        .card-panel {
            background-color: #12121a; padding: 30px; border-radius: 12px;
            border: 1px solid #00e5ff; box-shadow: 0 0 25px rgba(0, 229, 255, 0.15);
            text-align: center; width: 100%; max-width: 450px;
        }

        h1 { color: #00e5ff; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); font-size: 24px; margin-bottom: 20px; }
        p { color: #aaa; margin-bottom: 20px; font-size: 14px; }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #333; background-color: #1a1a26; color: #fff; text-align: center;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00e5ff; box-shadow: 0 0 8px rgba(0, 229, 255, 0.3); }

        .btn-action {
            width: 100%; padding: 14px; background-color: #00e5ff; color: #000;
            font-weight: bold; font-size: 16px; border: none; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-action:hover:not(:disabled) { box-shadow: 0 0 15px rgba(0, 229, 255, 0.6); transform: translateY(-2px); }
        .btn-action:disabled { background-color: #1a3333; color: #555; cursor: not-allowed; }

        .hidden { display: none !important; }
        .error-message { color: #ff4d4d; margin-top: 10px; font-size: 14px; }

        /* Estilos da Roleta Visual */
        .roleta-container {
            position: relative; width: 300px; height: 300px; margin: 0 auto 20px auto;
        }
        #canvas-roleta {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 5s cubic-bezier(0.25, 0.1, 0.2, 1);
            border: 3px solid #1a1a26; box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .pino {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #ff0055; z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }

        #resultado-final {
            font-size: 22px; font-weight: bold; min-height: 30px; margin-bottom: 15px;
            color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.4);
        }

        /* Tabela de Probabilidades no Final */
        .tabela-container {
            width: 100%; max-width: 600px; padding: 20px; margin-bottom: 40px;
        }
        table {
            width: 100%; border-collapse: collapse; background-color: #12121a;
            border-radius: 8px; overflow: hidden; border: 1px solid #333;
        }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background-color: #1a1a26; color: #00e5ff; font-weight: bold; text-transform: uppercase; }
        tr:hover { background-color: #1a1a26; }
        td:nth-child(2) { color: #00ffb3; font-weight: bold; width: 100px; text-align: right; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container">
        <div id="tela-login" class="card-panel">
            <h1>📦 ROLETA MISTERIOSA 📦</h1>
            <input type="text" id="chave-input" placeholder="Sua Chave de Acesso" autocomplete="off">
            <button id="btn-entrar" class="btn-action" onclick="verificarChave()">Acessar</button>
            <div id="erro-login" class="error-message hidden">Chave inválida ou já utilizada!</div>
        </div>

        <div id="tela-email" class="card-panel hidden">
            <h1>📦 ROLETA MISTERIOSA 📦</h1>
            <p>Confirme seu e-mail para registrar seu prêmio:</p>
            <input type="email" id="email-input" placeholder="seu@gmail.com" autocomplete="off">
            <button class="btn-action" onclick="irParaRoleta()">Continuar</button>
            <div id="erro-email" class="error-message hidden">Insira um e-mail válido.</div>
        </div>

        <div id="tela-roleta" class="card-panel hidden">
            <h1>📦 ROLETA MISTERIOSA 📦</h1>
            <div id="resultado-final">Gire para descobrir!</div>
            
            <div class="roleta-container">
                <div class="pino"></div>
                <canvas id="canvas-roleta" width="400" height="400"></canvas>
            </div>

            <button id="btn-girar" class="btn-action" onclick="girarRoleta()">🎲 GIRE AGORA 🎲</button>
        </div>
    </div>

    <div class="tabela-container">
        <table>
            <thead>
                <tr>
                    <th>Produtos Disponíveis</th>
                    <th>Chances</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                </tbody>
        </table>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = { databaseURL: "https://gerador-key-e364f-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let emailRegistrado = "";

        // Lista Oficial de Produtos (Probabilidades exatas)
        const produtos = [
            { nome: "Nada", peso: 78, cor: "#ff3333" },
            { nome: "Proxy iOS", peso: 1, cor: "#33ccff" },
            { nome: "Mod Apk 1 dia", peso: 2, cor: "#9933ff" },
            { nome: "Passador de replay", peso: 3, cor: "#ff9933" },
            { nome: "Qualquer produto de R$1", peso: 5, cor: "#00cc66" },
            { nome: "Ganhou R$ 1,00", peso: 2, cor: "#ffcc00" },
            { nome: "Ganhou R$ 0,50", peso: 3, cor: "#ff66cc" },
            { nome: "Ganhou R$ 0,25", peso: 5, cor: "#3366ff" }
        ];

        // 1. Preencher Tabela no fim da página
        const corpoTabela = document.getElementById("corpo-tabela");
        produtos.forEach(prod => {
            corpoTabela.innerHTML += `<tr><td>${prod.nome}</td><td>${prod.peso}%</td></tr>`;
        });

        // 2. Lógica de Telas (Firebase)
        function verificarChave() {
            const input = document.getElementById("chave-input").value.trim().toUpperCase();
            if(!input) return;
            document.getElementById("btn-entrar").disabled = true;

            const ref = database.ref("chaves/" + input);
            ref.once("value").then((snap) => {
                if (snap.exists()) {
                    ref.remove().then(() => {
                        document.getElementById("tela-login").classList.add("hidden");
                        document.getElementById("tela-email").classList.remove("hidden");
                    });
                } else {
                    document.getElementById("erro-login").classList.remove("hidden");
                    document.getElementById("btn-entrar").disabled = false;
                }
            });
        }

        function irParaRoleta() {
            const email = document.getElementById("email-input").value.trim();
            if(!email.includes("@")) return document.getElementById("erro-email").classList.remove("hidden");
            emailRegistrado = email;
            document.getElementById("tela-email").classList.add("hidden");
            document.getElementById("tela-roleta").classList.remove("hidden");
            desenharRoleta();
        }

        // 3. Sistema de Som (Zoadinha da Roleta)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function tocarSomTick() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); // Volume do som
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        // 4. Desenho e Física da Roleta Gráfica
        const canvas = document.getElementById("canvas-roleta");
        const ctx = canvas.getContext("2d");
        const arco = 2 * Math.PI / produtos.length;
        let anguloAtual = 0;

        function desenharRoleta() {
            for(let i = 0; i < produtos.length; i++) {
                const angulo = i * arco;
                ctx.beginPath();
                ctx.fillStyle = produtos[i].cor;
                ctx.moveTo(200, 200); // Centro do canvas (400/2)
                ctx.arc(200, 200, 200, angulo, angulo + arco);
                ctx.fill();
                ctx.stroke();

                // Desenhar o texto da fatia
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(angulo + arco / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px sans-serif";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 4;
                ctx.fillText(produtos[i].nome, 180, 5);
                ctx.restore();
            }
        }

        // Lógica de sorteio baseada nas porcentagens reais (Pesos)
        function sortearIndiceReal() {
            let total = produtos.reduce((acc, p) => acc + p.peso, 0);
            let random = Math.random() * total;
            let soma = 0;
            for (let i = 0; i < produtos.length; i++) {
                soma += produtos[i].peso;
                if (random <= soma) return i;
            }
            return 0; // Fallback
        }

        function girarRoleta() {
            document.getElementById("btn-girar").disabled = true;
            document.getElementById("resultado-final").innerText = "Girando...";
            document.getElementById("resultado-final").style.color = "#fff";

            // Sorteia quem vai ganhar usando a matemática correta da porcentagem
            const indiceSorteado = sortearIndiceReal();
            const premio = produtos[indiceSorteado].nome;

            // Calcula o ângulo que a roleta precisa parar para o pino (que está no topo - 270 graus)
            const girosExtras = 5 * 360; // 5 voltas completas
            const grausPorFatia = 360 / produtos.length;
            // Onde o meio da fatia sorteada vai parar
            const anguloFatia = (indiceSorteado * grausPorFatia) + (grausPorFatia / 2);
            const anguloParada = girosExtras + (270 - anguloFatia); 

            // Efeito Sonoro (Simulando o pino batendo)
            let tempo = 0;
            let intervaloSom = setInterval(() => {
                tocarSomTick();
                tempo += 150;
                if(tempo > 4500) clearInterval(intervaloSom); // Freando
            }, 150); // Faz a zoadinha no ritmo do giro

            // Aplica a animação CSS no canvas
            anguloAtual += anguloParada;
            canvas.style.transform = `rotate(${anguloAtual}deg)`;

            // Espera os 5 segundos da animação CSS acabar
            setTimeout(() => {
                clearInterval(intervaloSom);
                const resultDiv = document.getElementById("resultado-final");
                resultDiv.innerText = premio;
                
                if(premio === "Nada") {
                    resultDiv.style.color = "#ff3333";
                    resultDiv.style.textShadow = "0 0 10px rgba(255,51,51,0.5)";
                } else {
                    resultDiv.style.color = "#00ffb3";
                    resultDiv.style.textShadow = "0 0 10px rgba(0,255,179,0.5)";
                }

                // (Opcional) Salva o ganhador no banco
                database.ref("ganhadores").push({
                    email: emailRegistrado, premio: premio, data: new Date().toLocaleString()
                });

            }, 5000);
        }
    </script>
</body>
</html>
